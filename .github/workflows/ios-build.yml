name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Add Capacitor iOS Platform
        run: |
          npx cap add ios || true
          # Patch Podfile for Capacitor 8.3 (Higher deployment target required)
          if [ -f ios/App/Podfile ]; then
            sed -i '' "s/.*platform :ios.*/platform :ios, '15.0'/g" ios/App/Podfile
            echo "
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
                end
              end
            end" >> ios/App/Podfile
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive -archivePath App.xcarchive

      - name: Upload Archive to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: App.xcarchive
