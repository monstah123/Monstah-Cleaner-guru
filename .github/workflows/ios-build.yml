name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Add Capacitor iOS Platform
        run: |
          # Start clean
          rm -rf ios
          npx cap add ios
          
          # Patch Podfile for Capacitor 8.3 + Node 22 (Higher deployment target required)
          if [ -f ios/App/Podfile ]; then
            # Fix the platform line
            sed -i '' "s/.*platform :ios.*/platform :ios, '15.0'/g" ios/App/Podfile
            
            # Append post_install hook to force all pods to iOS 15.0
            cat <<EOF >> ios/App/Podfile

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    end
  end
end
EOF
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Archive
        run: |
          # Ensure workspace exists before building
          if [ ! -d ios/App/App.xcworkspace ]; then
            echo "Error: ios/App/App.xcworkspace not found!"
            ls -R ios/App
            exit 1
          fi
          
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive -archivePath App.xcarchive

      - name: Upload Archive to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: App.xcarchive
