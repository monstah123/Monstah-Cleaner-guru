name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Add Capacitor iOS Platform
        run: |
          rm -rf ios
          npx cap add ios

      - name: Patch Podfile for iOS 15
        run: |
          if [ -f ios/App/Podfile ]; then
            # Set the main platform
            sed -i '' "s/.*platform :ios.*/platform :ios, '15.0'/g" ios/App/Podfile
            
            # Create a small ruby script to patch the rest
            cat > patch_pods.rb <<'RUBY'
            content = File.read('ios/App/Podfile')
            if !content.include?('post_install')
              content += "\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'\n    end\n  end\nend\n"
              File.write('ios/App/Podfile', content)
            end
RUBY
            ruby patch_pods.rb
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Archive
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive -archivePath App.xcarchive

      - name: Upload Archive to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: App.xcarchive
