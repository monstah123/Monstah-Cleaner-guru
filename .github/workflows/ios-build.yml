name: Build iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets (Vite)
        run: npm run build

      - name: Add Capacitor iOS Platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Install Apple Certificate and Provisioning Profile (Placeholder)
        # This is where we would normally install the certificates.
        # To get a real .ipa for Transporter, you need to add your secrets to GitHub.
        run: echo "Skipping signing for now. You will need to add Apple Developer secrets for a full .ipa."

      - name: Build Xcode Archive
        # This will build the app to ensure your code is error-free on iOS.
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean archive -archivePath App.xcarchive

      - name: Upload Archive to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: App.xcarchive
